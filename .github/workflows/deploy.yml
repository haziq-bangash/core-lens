name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for keyless Workload Identity Federation auth

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${{ vars.GCP_SERVICE_NAME }}:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Everything the app needs (server secrets + NEXT_PUBLIC_* values) lives in
      # one multi-line secret (ENV_FILE), formatted exactly like a normal .env
      # file. This is the only place new env vars need to be added going
      # forward -- this workflow never needs to change for that.
      - name: Materialize env file
        env:
          ENV_FILE_CONTENTS: ${{ secrets.ENV_FILE }}
        run: printf '%s\n' "$ENV_FILE_CONTENTS" > prod.env

      # prod.env sits in the build context root (not excluded by .dockerignore)
      # and gets picked up by the Dockerfile's `COPY . .` + sourced internally,
      # so both NEXT_PUBLIC_* (client bundle) and server-only vars (several
      # modules construct DB/API clients at import time) are real during the
      # build -- matching Cloud Run runtime instead of crashing on `undefined`.
      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Build Cloud Run env-vars file
        run: |
          : > env.yaml
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|'#'*) continue ;;
            esac
            key="${line%%=*}"
            value="${line#*=}"
            value="${value//\\/\\\\}"
            value="${value//\"/\\\"}"
            printf '%s: "%s"\n' "$key" "$value" >> env.yaml
          done < prod.env

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE" \
            --region="$REGION" \
            --platform=managed \
            --port=3000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --allow-unauthenticated \
            --env-vars-file=env.yaml
